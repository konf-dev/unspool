# Job definitions — cron schedules and post-processing dispatch map.
# Cron schedules are registered with QStash on startup (idempotent via schedule_id).
# Consolidated from 10 individual crons to 3 to stay within QStash free tier (10 max schedules).

cron_jobs:
  hourly-maintenance:
    schedule: "0 * * * *"
    schedule_id: unspool-hourly-maintenance

  nightly-batch:
    schedule: "0 3 * * *"
    schedule_id: unspool-nightly-batch

  sync-calendar:
    schedule: "0 */4 * * *"
    schedule_id: unspool-sync-calendar

# Maps post-processing job names to /jobs/ endpoint paths
dispatch_map:
  process_message: process-message
