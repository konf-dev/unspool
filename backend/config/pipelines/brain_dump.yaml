name: brain_dump
description: Process a brain dump — extract items, enrich, save, respond naturally

steps:
  - id: extract
    type: llm_call
    prompt: brain_dump_extract.md
    output_schema: ItemExtraction
    model: null  # uses default

  - id: enrich
    type: tool_call
    tool: enrich_items
    input:
      items: "${steps.extract.output.items}"

  - id: save
    type: tool_call
    tool: save_items
    input:
      user_id: "${context.user_id}"
      items: "${steps.enrich.output}"
      source_message_id: null

  - id: respond
    type: llm_call
    prompt: brain_dump_respond.md
    stream: true
    input:
      extracted_items: "${steps.extract.output}"
      saved_count: "${steps.save.output}"

post_processing:
  - job: process_conversation
    delay: "10s"
