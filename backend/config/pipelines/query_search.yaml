name: query_search
description: User searches for something specific — analyzes the query, fetches targeted data, responds

steps:
  - id: analyze
    type: llm_call
    prompt: analyze_query.md
    output_schema: QueryAnalysis

  - id: fetch
    type: tool_call
    tool: smart_fetch
    input:
      user_id: "${context.user_id}"
      query_spec: "${steps.analyze.output}"

  - id: respond
    type: llm_call
    prompt: query_deep_respond.md
    model: null
    stream: true
    input:
      query_analysis: "${steps.analyze.output}"
      results: "${steps.fetch.output}"
      user_profile: "${context.profile}"
