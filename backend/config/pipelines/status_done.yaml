name: status_done
description: User marks something as done

steps:
  - id: match_item
    type: tool_call
    tool: fuzzy_match_item
    optional: true
    input:
      user_id: "${context.user_id}"
      text: "${user_message}"

  - id: mark_done
    type: tool_call
    tool: mark_item_done
    optional: true
    input:
      item: "${steps.match_item.output}"
      user_id: "${context.user_id}"

  - id: check_momentum
    type: tool_call
    tool: check_momentum
    optional: true
    input:
      user_id: "${context.user_id}"

  - id: respond
    type: llm_call
    prompt: status_done_respond.md
    stream: true
    input:
      item: "${steps.match_item.output}"
      momentum: "${steps.check_momentum.output}"
      user_profile: "${context.profile}"

post_processing:
  - job: process_graph
    delay: "5s"
