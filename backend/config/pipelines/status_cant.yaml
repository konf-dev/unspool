name: status_cant
description: User can't do something

steps:
  - id: match_item
    type: tool_call
    tool: fuzzy_match_item
    input:
      user_id: "${context.user_id}"
      text: "${user_message}"

  - id: reschedule
    type: tool_call
    tool: reschedule_item
    input:
      item: "${steps.match_item.output}"
      user_id: "${context.user_id}"

  - id: respond
    type: llm_call
    prompt: status_cant_respond.md
    model: null
    stream: true
    input:
      item: "${steps.match_item.output}"
      user_profile: "${context.profile}"
