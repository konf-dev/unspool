name: emotional
description: User expressing emotions

steps:
  - id: detect_level
    type: llm_call
    prompt: emotional_detect.md
    model: gpt-4.1-mini
    input:
      message: "${user_message}"
    output_schema: EmotionalDetection

  - id: respond
    type: llm_call
    prompt: emotional_respond.md
    stream: true
    input:
      level: "${steps.detect_level.output}"
      user_profile: "${context.profile}"
      open_items: "${context.open_items}"

post_processing:
  - job: process_graph
    delay: "5s"
