cases:
  # --- brain_dump (5) ---
  - id: intent_brain_dump_simple
    category: intent
    message: "I need to buy groceries and pick up my dry cleaning"
    expected_intent: brain_dump
    tags: [intent, brain_dump]

  - id: intent_brain_dump_deadline
    category: intent
    message: "finish the report by Friday and email it to Sarah"
    expected_intent: brain_dump
    tags: [intent, brain_dump]

  - id: intent_brain_dump_multi
    category: intent
    message: "oh also I need to call the dentist, renew my passport, and figure out that insurance thing"
    expected_intent: brain_dump
    tags: [intent, brain_dump]

  - id: intent_brain_dump_idea
    category: intent
    message: "I had an idea for the blog post — something about productivity myths"
    expected_intent: brain_dump
    tags: [intent, brain_dump]

  - id: intent_brain_dump_implicit
    category: intent
    message: "my car registration expires next month"
    expected_intent: brain_dump
    tags: [intent, brain_dump]

