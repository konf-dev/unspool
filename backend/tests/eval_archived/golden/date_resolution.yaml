cases:
  - id: date_tomorrow
    category: date_resolution
    message: "I need to call the doctor tomorrow"
    assertions:
      - type: min_count
        field: item_count
        value: 1
      - type: not_null
        field: "items[0].deadline_at"
    tags: [date, regression, "regression:BUG-002"]

  - id: date_next_friday
    category: date_resolution
    message: "the presentation is due next Friday"
    assertions:
      - type: min_count
        field: item_count
        value: 1
      - type: not_null
        field: "items[0].deadline_at"
    tags: [date, regression, "regression:BUG-002"]

  - id: date_specific
