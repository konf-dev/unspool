cases:
  # BUG-001: fromisoformat crashes on non-ISO deadline strings
  - id: bug_001_non_iso_deadline
    category: regression
    message: "finish the essay by tomorrow"
    assertions:
      - type: not_contains
        field: response
        value: "something went wrong"
      - type: min_count
        field: item_count
        value: 1
    tags: [regression, "regression:BUG-001"]

  # BUG-002: Extraction prompt has no current date context
  - id: bug_002_date_context_tomorrow
    category: regression
    message: "call the doctor tomorrow"
    assertions:
      - type: min_count
        field: item_count
        value: 1
      - type: not_null
        field: "items[0].deadline_at"
    tags: [regression, "regression:BUG-002"]

  - id: bug_002_date_context_friday
    category: regression
    message: "the presentation is next Friday"
    assertions:
      - type: min_count
        field: item_count
        value: 1
      - type: not_null
        field: "items[0].deadline_at"
    tags: [regression, "regression:BUG-002"]

  # BUG-003: Extracted datetimes have no timezone
  - id: bug_003_timezone
    category: regression
    message: "submit the report by 5pm today"
    assertions:
      - type: min_count
        field: item_count
        value: 1
    tags: [regression, "regression:BUG-003"]

  # BUG-014: query_next says "nothing to do" when items exist in conversation
  - id: bug_014_nothing_to_do
    category: regression
    message: "what should I do?"
    assertions:
      - type: not_contains
        field: response
        value: "all clear"
      - type: not_contains
        field: response
        value: "nothing"
      - type: not_contains
        field: response
        value: "no items"
    tags: [regression, "regression:BUG-014"]

  # BUG-015: Silent save failures — user thinks items were saved
  - id: bug_015_confirms_save
    category: regression
    message: "need to pay rent by the 1st and renew my gym membership"
    assertions:
      - type: min_count
        field: item_count
        value: 1
      - type: not_contains
        field: response
        value: "something went wrong"
    tags: [regression, "regression:BUG-015"]

  # BUG-017: Model too weak for date resolution
  - id: bug_017_date_year
    category: regression
    message: "the conference is March 20th"
    assertions:
      - type: min_count
        field: item_count
        value: 1
      - type: not_null
        field: "items[0].deadline_at"
    tags: [regression, "regression:BUG-017"]

  # BUG-018: Unsolicited empathy on neutral messages
  - id: bug_018_no_empathy_exam
    category: regression
    message: "I have an exam Friday"
    assertions:
      - type: not_contains
        field: response
        value: "overwhelming"
      - type: not_contains
        field: response
        value: "stressful"
      - type: not_contains
        field: response
        value: "you're stuck"
    judge_criteria:
      - name: no_assumed_stress
        prompt: "Does the response treat 'I have an exam Friday' as a simple factual statement without assuming the user is stressed or anxious?"
        pass_threshold: 7.0
    tags: [regression, "regression:BUG-018"]

  - id: bug_018_no_empathy_tasks
    category: regression
    message: "laundry, dishes, vacuum the living room"
    assertions:
      - type: not_contains
        field: response
        value: "lot on your plate"
      - type: not_contains
        field: response
        value: "overwhelm"
    judge_criteria:
      - name: neutral_capture
        prompt: "Does the response simply acknowledge the tasks without adding emotional language about being busy or stressed?"
        pass_threshold: 7.0
    tags: [regression, "regression:BUG-018"]

  - id: bug_018_no_empathy_morning
    category: regression
    message: "morning. need to send that email and prep for the meeting"
    assertions:
      - type: not_contains
        field: response
        value: "tough"
      - type: not_contains
        field: response
        value: "hang in there"
    judge_criteria:
      - name: match_casual_tone
        prompt: "Does the response match the user's casual morning greeting without projecting stress?"
        pass_threshold: 7.0
    tags: [regression, "regression:BUG-018"]

  # BUG-014 variant: "nothing to do" with items in context
  - id: bug_014_has_items_query
    category: regression
    message: "what's next?"
    assertions:
      - type: not_contains
        field: response
        value: "nothing"
      - type: not_contains
        field: response
        value: "all clear"
      - type: not_contains
        field: response
        value: "plate is clear"
    tags: [regression, "regression:BUG-014"]

  # Edge case: multiple deadlines in one message
  - id: bug_multi_deadline
    category: regression
    message: "report due Wednesday, slides due Thursday, email Jake by end of day"
    assertions:
      - type: min_count
        field: item_count
        value: 3
    tags: [regression]
