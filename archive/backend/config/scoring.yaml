# Urgency decay/ramp parameters (used by decay_urgency cron job)
decay:
  soft_decay_factor: 0.95
  auto_expire_days: 30
  auto_expire_threshold: 0.1
  hard_ramp:
    overdue: 1.0
    within_24h_base: 0.7
    within_24h_divisor: 80
    within_72h_base: 0.5
    within_72h_divisor: 96

# Momentum tracking (used by check_momentum tool)
momentum:
  lookback_hours: 24
  on_a_roll_threshold: 3

# Item selection scoring boosts (used by pick_next_item tool)
pick_next:
  boost_hard_deadline: 0.3
  boost_soft_deadline: 0.1
  boost_low_energy: 0.15
  boost_medium_energy: 0.05
  boost_never_surfaced: 0.1

# Reschedule delays (used by reschedule_item tool)
reschedule:
  urgency_decay_factor: 0.7
  nudge_delay:
    hard_hours: 4
    soft_days: 2
    none_days: 7

# Fuzzy matching thresholds (used by fuzzy_match_item tool)
matching:
  min_similarity: 0.3
  substring_boost: 0.7

# Push notification settings (used by check_deadlines job)
notifications:
  quiet_hours_start: 1
  quiet_hours_end: 7
  deadline_window_hours: 24
  title: "unspool"
  body_single: "Deadline approaching: {action}"
  body_multiple: "You have {count} items with deadlines in the next {hours} hours"
