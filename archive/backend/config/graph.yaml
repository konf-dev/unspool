# Graph memory system config — production

ingest:
  quick_model: gpt-4.1
  quick_max_nodes: 10
  deep_model: gpt-4.1-mini
  recent_nodes_context: 30

retrieval:
  default_triggers:
    - semantic
    - temporal
    - open_items
    - recent
    - suppression
  graph_walk_hops: 1
  max_subgraph_nodes: 100
  semantic_limit: 15
  temporal_window_hours: 48
  recent_limit: 10
  suppression_window_hours: 24

serialization:
  max_context_tokens: 4000

evolution:
  embedding_model: text-embedding-3-small
  similarity_threshold: 0.8
  dedup_threshold: 0.9
  edge_decay_factor: 0.99
  edge_decay_min: 0.01
  contradiction_threshold: 0.9
  shortcut_co_retrieval_count: 3

feedback:
  async_detection: true

# When true, graph context is logged but not injected into responses.
# Set to false to go live.
shadow_mode: false
