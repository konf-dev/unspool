services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: graph_lab
      POSTGRES_PASSWORD: graph_lab
      POSTGRES_DB: graph_lab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph_lab"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
