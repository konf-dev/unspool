description: "Unspool API eval suite"

prompts:
  - "{{message}}"

providers:
  - id: https
    config:
      url: "https://api.unspool.life/api/chat"
      method: POST
      headers:
        Authorization: "Bearer eval:{{env.EVAL_API_KEY}}"
        Content-Type: "application/json"
      body:
        message: "{{prompt}}"
        session_id: "eval-{{context.uuid}}"
      transformResponse: |
        (json, text) => {
          let out = '';
          for (const line of String(text || '').split('\n')) {
            if (!line.trim().startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.trim().slice(6));
              if (evt.type === 'token') out += evt.content;
            } catch {}
          }
          return out.trim();
        }

defaultTest:
  options:
    provider: "google:gemini-2.5-flash"
  assert:
    - type: latency
      threshold: 15000

tests:
  - file://cases/intent.yaml
  - file://cases/extraction.yaml
  - file://cases/personality.yaml
  - file://cases/emotional.yaml
  - file://cases/functional.yaml
  - file://cases/edge_cases.yaml
  - file://cases/multi_turn.yaml
  - file://cases/regression.yaml
